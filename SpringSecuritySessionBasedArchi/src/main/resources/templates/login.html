<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
</head>
<body>

<h1>Spring Security Session Login</h1>

<form method="post" action="/perform-login">

<!--    <input type="hidden"-->
<!--           th:name="${_csrf.parameterName}"-->
<!--           th:value="${_csrf.token}" />-->

    <div>
        <input type="text"
               name="username"
               placeholder="아이디">
    </div>

    <div>
        <input type="password"
               name="password"
               placeholder="비밀번호">
    </div>

    <button type="submit">
        로그인
    </button>

</form>

<div th:if="${param.error}">
    로그인 실패
</div>

<div th:if="${param.logout}">
    로그아웃 완료
</div>

</body>
</html>
