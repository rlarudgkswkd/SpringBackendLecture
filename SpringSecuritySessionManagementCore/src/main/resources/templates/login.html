<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Login</title>
</head>
<body>

<h1>Login</h1>

<form method="post" action="/perform-login">

  <input type="hidden"
         th:name="${_csrf.parameterName}"
         th:value="${_csrf.token}" />

  <div>
    <input type="text"
           name="username"
           placeholder="username">
  </div>

  <div>
    <input type="password"
           name="password"
           placeholder="password">
  </div>

  <button type="submit">
    로그인
  </button>

</form>

</body>
</html>
